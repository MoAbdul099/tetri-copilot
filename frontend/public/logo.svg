<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tetri Copilot Logo</title>
  <desc id="desc">Primary horizontal logo for Tetri Copilot with modular T icon, wordmark, and tagline.</desc>

  <defs>
    <linearGradient id="tetriBlue" x1="80" y1="70" x2="310" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1447e6"/>
      <stop offset="1" stop-color="#155dfc"/>
    </linearGradient>
  </defs>

  <!-- Icon: Modular T Mark -->
  <g id="tetri-icon">
    <rect x="80" y="78" width="118" height="78" rx="16" fill="url(#tetriBlue)"/>
    <rect x="216" y="78" width="118" height="78" rx="16" fill="#155dfc"/>
    <rect x="122" y="178" width="76" height="112" rx="16" fill="#1447e6"/>
    <rect x="216" y="178" width="76" height="112" rx="16" fill="#155dfc"/>

    <!-- AI sparkle -->
    <path d="M365 58C374.5 89.5 383.5 98.5 415 108C383.5 117.5 374.5 126.5 365 158C355.5 126.5 346.5 117.5 315 108C346.5 98.5 355.5 89.5 365 58Z" fill="#155dfc"/>
  </g>

  <!-- Wordmark -->
  <g id="tetri-wordmark">
    <text x="460" y="170"
          font-family="Manrope, Inter, Arial, Helvetica, sans-serif"
          font-size="86"
          font-weight="800"
          letter-spacing="-2.5">
      <tspan fill="#0f172b">Tetri </tspan><tspan fill="#1447e6">Copilot</tspan>
    </text>

    <text x="466" y="230"
          font-family="Manrope, Inter, Arial, Helvetica, sans-serif"
          font-size="32"
          font-weight="500"
          letter-spacing="-0.4"
          fill="#4a5565">
      AI-powered finance. Simplified.
    </text>
  </g>
</svg>
