# Tetri Copilot — Nginx Configuration (fallback to LiteSpeed)
# Production domain: api.tetricopilot.com
#
# This config is a fallback for environments without LiteSpeed.
# Primary web server config lives at: deploy/litespeed/tetri-copilot.conf

server {
    listen 80;
    server_name api.tetricopilot.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.tetricopilot.com;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/ssl/cloudflare/tetricopilot.crt;
    ssl_certificate_key /etc/ssl/cloudflare/tetricopilot.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25M;

    gzip on;
    gzip_vary on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1000;

    # Security headers
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-Frame-Options          "DENY"            always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';

        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}
