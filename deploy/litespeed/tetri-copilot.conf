# Tetri Copilot — LiteSpeed Virtual Host Configuration
# Place at: /usr/local/lsws/conf/vhosts/tetri-copilot/vhconf.conf
#
# LiteSpeed handles:
#   - HTTPS termination (Cloudflare Origin Certificate)
#   - HTTP/2 + QUIC/HTTP3 support
#   - Reverse proxy to Express API (port 5000)
#   - Gzip/Brotli compression
#   - Security headers
#   - WebSocket support
# ---------------------------------------------------------------------------

virtualhost tetri-api {
  vhRoot                  /var/www/tetri-copilot/backend
  configFile              $SERVER_ROOT/conf/vhosts/tetri-api/vhconf.conf
  allowSymbolLink         1
  enableScript            1
  restrained              0
  setUIDMode              0
}

# ---------------------------------------------------------------------------
# Virtual Host Config: /usr/local/lsws/conf/vhosts/tetri-api/vhconf.conf
# ---------------------------------------------------------------------------

docRoot                   /var/www/tetri-copilot/backend/public

errorlog $VH_ROOT/logs/error.log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

accesslog $VH_ROOT/logs/access.log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b"
  logHeaders              5
  rollingSize             10M
  keepDays                30
}

# ── SSL Configuration (Cloudflare Origin Certificate) ──────────────────────
vhssl {
  keyFile                 /etc/ssl/cloudflare/tetricopilot.key
  certFile                /etc/ssl/cloudflare/tetricopilot.crt
  certChain               1
  protocol                TLSv1.2+TLSv1.3
  ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
  enableECDHE             1
  enableDHE               1
  renegProtection         1
  sslSessionCache         1
  sslSessionTickets       0
  enableSpdy              15
  enableQuic              1
}

# ── Security Headers ─────────────────────────────────────────────────────────
extprocessor api-backend {
  type                    proxy
  address                 localhost:5000
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

# ── Rewrite Rules ────────────────────────────────────────────────────────────
rewrite {
  enable                  1
  autoLoadHtaccess        0
  # Force HTTPS
  rules                   <<<END_RULES
RewriteCond %{HTTPS} !on
RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
END_RULES
}

# ── Context: API proxy (/api/*) ───────────────────────────────────────────────
context /api/ {
  type                    proxy
  handler                 api-backend
  addDefaultCharset       off
}

# ── Context: Static health probe ─────────────────────────────────────────────
context /api/v1/health {
  type                    proxy
  handler                 api-backend
  addDefaultCharset       off
}

# ── Compression ──────────────────────────────────────────────────────────────
expires {
  enableExpires           1
  expiresByType           image/gif=A604800, image/png=A604800, image/jpeg=A604800,
                          text/css=A86400, application/javascript=A86400
}
