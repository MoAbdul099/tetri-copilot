name: Load Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Base URL to load test (e.g. https://api.tetricopilot.com)"
        required: true
        default: "https://api.tetricopilot.com"
      duration:
        description: "Test duration in seconds"
        required: false
        default: "30"
      vus:
        description: "Number of virtual users"
        required: false
        default: "10"

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Write k6 script
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: |
          cat > load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Rate } from 'k6/metrics';

          const errorRate = new Rate('errors');

          export const options = {
            vus: __ENV.VUS ? parseInt(__ENV.VUS) : 10,
            duration: `${__ENV.DURATION || '30'}s`,
            thresholds: {
              http_req_duration: ['p(95)<2000'],
              http_req_failed:   ['rate<0.05'],
              errors:            ['rate<0.05'],
            },
          };

          const BASE = __ENV.TARGET_URL;

          export default function () {
            const healthRes = http.get(`${BASE}/api/v1/health`);
            const ok = check(healthRes, {
              'health status 200': (r) => r.status === 200,
              'health response < 500ms': (r) => r.timings.duration < 500,
            });
            errorRate.add(!ok);
            sleep(1);

            const versionRes = http.get(`${BASE}/api/v1/health/version`);
            check(versionRes, {
              'version status 200': (r) => r.status === 200,
            });
            sleep(1);
          }
          EOF

      - name: Run k6 load test
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          VUS: ${{ github.event.inputs.vus }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          k6 run \
            --env TARGET_URL="$TARGET_URL" \
            --env VUS="$VUS" \
            --env DURATION="$DURATION" \
            --out json=results.json \
            load-test.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: results.json
          retention-days: 30
