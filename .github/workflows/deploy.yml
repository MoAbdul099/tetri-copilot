name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Validate backend
        working-directory: backend
        run: |
          npm ci
          npx prisma validate

      - name: Validate frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: https://api.tetricopilot.com
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

  deploy-backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./backend/package.json').version")" >> $GITHUB_OUTPUT

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DEPLOY_SECRET,VERSION,ACTOR
          script: |
            export DEPLOY_SECRET="${{ secrets.DEPLOY_SECRET }}"
            export VERSION="${{ steps.version.outputs.version }}"
            export ACTOR="github-actions/${{ github.actor }}"
            bash /var/www/tetri-copilot/deploy/scripts/deploy-backend.sh production "$VERSION" "$ACTOR"

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.tetricopilot.com
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_ENVIRONMENT: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tetri-copilot
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  smoke-test:
    name: Post-deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Health check — API
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.tetricopilot.com/api/v1/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Health check — DB
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.tetricopilot.com/api/v1/health/db)
          echo "DB health status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Version check
        run: |
          curl -sf https://api.tetricopilot.com/api/v1/health/version | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('Version:', d['data']['version'])"
